on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: leaderboard
      - run: |
          curl -s -H "stream-key: fcba1f4a75626dce876aee93192cde00" \
            https://backend.saweria.co/widgets/leaderboard/all \
            -o leaderboard.json
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: leaderboard
          create_branch: true
          commit_message: "sync: update leaderboard"
